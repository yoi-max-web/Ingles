<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egglish - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1cb0f6;
            --blue-shadow: #0090d9;
            --green: #58cc02;
            --green-shadow: #46a302;
            --bg-color: #f0f4f8;
            --border-color: #e5e7eb;
            --text-color: #4b4b4b;
            --input-bg: #f7f9fa;
            --focus-border: #84d8ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        /* Tarjeta Principal */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
        }

        .card-header {
            margin-bottom: 25px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-color);
        }

        /* Formularios y Entradas */
        .login-form, .recovery-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            background-color: var(--input-bg);
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
            color: var(--text-color);
        }

        .input-group.password-field-wrapper input {
            padding-right: 52px;
        }

        .input-group input:focus {
            border-color: var(--focus-border);
            background-color: white;
        }

        .input-group input::placeholder {
            color: #afafaf;
            font-weight: 700;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: #6b7280;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        .password-toggle:hover {
            background-color: #f3f4f6;
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.92);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .forgot-password {
            color: var(--blue);
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            text-align: left;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Botones "Fat" */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-primary {
            background-color: var(--blue);
            box-shadow: 0 4px 0 var(--blue-shadow);
            margin-top: 5px;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--blue-shadow);
        }

        .btn-secondary {
            background-color: var(--green);
            box-shadow: 0 4px 0 var(--green-shadow);
            margin-top: 5px;
        }

        .btn-secondary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--green-shadow);
        }

        /* Ventana Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            position: relative;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            width: auto;
            padding: 0;
            background: none;
            box-shadow: none;
            color: #afafaf;
            font-size: 24px;
            font-weight: bold;
            text-transform: none;
            margin: 0;
        }

        .close-btn:hover {
            color: var(--text-color);
        }

        .close-btn:active {
            transform: none;
        }

        .modal-content h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .modal-content p {
            margin-bottom: 20px;
            color: #777;
            font-weight: 700;
            font-size: 15px;
        }

        .success-message {
            color: var(--green) !important;
            margin-top: 15px;
            margin-bottom: 0 !important;
            font-weight: 800 !important;
        }

        .success-message.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <header class="card-header">
                <div class="logo-container">
                    <!-- Referencia al logo si tienes una imagen real, o un placeholder visual -->
                    <img src="https://em-content.zobj.net/source/twitter/376/hatching-chick_1f423.png" alt="Egglish Logo" class="logo">
                    <h1>Egglish</h1>
                </div>
            </header>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group password-field-wrapper">
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="button" class="password-toggle" id="password-toggle" aria-label="Mostrar contraseña">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <a href="#" id="forgotPasswordBtn" class="forgot-password">¿Olvidaste tu contraseña?</a>
                <button type="submit" class="btn-primary">INGRESAR</button>
            </form>
        </div>
    </main>

    <!-- Modal de Recuperación -->
    <div id="recoveryModal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-btn" type="button">&times;</button>
            <h2>Recuperar cuenta</h2>
            <p>Ingresa tu correo para recuperar tu cuenta</p>
            <form id="recoveryForm" class="recovery-form">
                <div class="input-group">
                    <input type="email" id="recoveryEmail" placeholder="Correo electrónico" required>
                </div>
                <button type="submit" class="btn-secondary">ENVIAR CORREO</button>
                <p id="successMessage" class="success-message hidden">Correo enviado con éxito</p>
            </form>
        </div>
    </div>

    <script type="module">
        // ── Firebase CDN ──────────────────────────────────────
        import { firebaseConfig } from '/Secciones/Js/firebase-config.js';

        const FB_CDN = 'https://www.gstatic.com/firebasejs/10.12.2';

        // Inicializar Firebase una sola vez
        const { initializeApp, getApps } = await import(`${FB_CDN}/firebase-app.js`);
        const { getAuth, sendPasswordResetEmail } = await import(`${FB_CDN}/firebase-auth.js`);

        const app  = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);

        // ── Referencias DOM ───────────────────────────────────
        const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
        const recoveryModal     = document.getElementById('recoveryModal');
        const closeModalBtn     = document.getElementById('closeModalBtn');
        const recoveryForm      = document.getElementById('recoveryForm');
        const successMessage    = document.getElementById('successMessage');
        const recoveryEmailIn   = document.getElementById('recoveryEmail');
        const sendBtn           = recoveryForm.querySelector('button[type="submit"]');

        // ── Elemento de error (lo creamos dinámicamente) ──────
        const errorMsg = document.createElement('p');
        errorMsg.style.cssText = `
            color: #ef4444; font-weight: 800; font-size: 14px;
            margin: 0; display: none; font-family: 'Nunito', sans-serif;
        `;
        sendBtn.parentNode.insertBefore(errorMsg, sendBtn);

        // ── Abrir modal ───────────────────────────────────────
        forgotPasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            recoveryModal.classList.remove('hidden');
        });

        // ── Cerrar modal con "X" ──────────────────────────────
        closeModalBtn.addEventListener('click', closeModal);

        // ── Cerrar modal al hacer clic fuera ──────────────────
        recoveryModal.addEventListener('click', (e) => {
            if (e.target === recoveryModal) closeModal();
        });

        // ── Enviar correo de recuperación con Firebase ────────
        recoveryForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = recoveryEmailIn.value.trim();
            if (!email) {
                showError('Ingresa tu correo electrónico.');
                return;
            }

            // Estado de carga
            sendBtn.disabled    = true;
            sendBtn.textContent = 'ENVIANDO...';
            sendBtn.style.opacity = '0.7';
            errorMsg.style.display = 'none';
            successMessage.classList.add('hidden');

            try {
                await sendPasswordResetEmail(auth, email);

                // ✅ Éxito: mostrar mensaje verde
                successMessage.textContent = '✅ Correo enviado. Revisa tu bandeja de entrada.';
                successMessage.classList.remove('hidden');
                sendBtn.textContent  = 'ENVIADO ✓';
                sendBtn.style.background = '#58cc02';
                sendBtn.style.boxShadow  = '0 4px 0 #46a302';

                // Cerrar modal después de 3 segundos
                setTimeout(closeModal, 3000);

            } catch (err) {
                // ❌ Error: mostrar mensaje rojo
                sendBtn.disabled    = false;
                sendBtn.textContent = 'ENVIAR CORREO';
                sendBtn.style.opacity = '1';
                showError(getResetError(err.code));
            }
        });

        // ── Helpers ───────────────────────────────────────────
        function showError(msg) {
            errorMsg.textContent   = msg;
            errorMsg.style.display = 'block';
        }

        function closeModal() {
            recoveryModal.classList.add('hidden');
            recoveryForm.reset();
            successMessage.classList.add('hidden');
            errorMsg.style.display  = 'none';
            sendBtn.disabled        = false;
            sendBtn.textContent     = 'ENVIAR CORREO';
            sendBtn.style.opacity   = '1';
            sendBtn.style.background = '';
            sendBtn.style.boxShadow  = '';
        }

        function getResetError(code) {
            const map = {
                'auth/invalid-email':        'El correo no es válido.',
                'auth/user-not-found':       'No existe una cuenta con ese correo.',
                'auth/too-many-requests':    'Demasiados intentos. Espera unos minutos.',
                'auth/network-request-failed': 'Sin conexión. Revisa tu internet.',
                'auth/missing-email':        'Ingresa tu correo electrónico.',
            };
            return map[code] || 'Error al enviar el correo. Intenta de nuevo.';
        }
    </script>
  <!-- ★ EGGLISH AUTH ★ -->
  <script type="module" src="/Secciones/Js/entrar-logic.js"></script>
</body>
</html>
