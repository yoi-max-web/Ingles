<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egglish - Crear Cuenta</title>

    <!-- Import Nunito Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta original — sin cambios */
            --blue: #1cb0f6;
            --blue-shadow: #0090d9;
            --border-color: #e5e7eb;
            --text-main: #374151;
            --text-placeholder: #9ca3af;
            --bg-page: #f0f4f8;
            --bg-card: #ffffff;
            --bg-input: #f9fafb;

            /* Tokens auxiliares — solo para elevación/espaciado, no alteran la identidad de color */
            --blue-soft: rgba(28, 176, 246, 0.14);
            --blue-soft-strong: rgba(28, 176, 246, 0.22);
            --success: #16a34a;
            --success-soft: rgba(22, 163, 74, 0.1);
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.08);
            --shadow-card: 0 24px 48px -16px rgba(15, 23, 42, 0.10), 0 2px 6px rgba(15, 23, 42, 0.04);
            --shadow-input-focus: 0 0 0 4px var(--blue-soft);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-page);
            background-image: radial-gradient(circle at 15% 8%, rgba(28, 176, 246, 0.06), transparent 45%),
                               radial-gradient(circle at 85% 92%, rgba(28, 176, 246, 0.05), transparent 45%);
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .registration-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 28px 28px 20px; /* reducido para caber mejor en pantallas pequeñas */
            width: min(100%, 560px);
            max-width: 560px;
            box-shadow: var(--shadow-card);
        }

        /* Branding Header */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 0;
            margin-bottom: 36px;
            width: 100%;
        }

        .logo-placeholder {
            width: 48px;
            height: 48px;
        }

        .card-header img {
            width: 46px;
            height: auto;
            display: block;
            filter: drop-shadow(0 4px 10px rgba(28, 176, 246, 0.22));
        }

        .card-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--text-main);
            margin: 0;
        }

        /* Form Layout */
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Input Fields */
        .input-field {
            width: 100%;
            padding: 15px 18px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            background-color: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            outline: none;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.02);
            transition: border-color 0.2s var(--ease), background-color 0.2s var(--ease),
                        box-shadow 0.2s var(--ease), transform 0.15s var(--ease);
        }

        .input-field::placeholder {
            color: var(--text-placeholder);
            font-weight: 400;
        }

        .input-field:hover {
            border-color: #d1d5db;
        }

        .input-field:focus {
            border-color: var(--blue);
            background-color: var(--bg-card);
            box-shadow: var(--shadow-input-focus);
        }

        .password-field-wrapper {
            position: relative;
            display: block;
        }

        .password-field-wrapper .input-field {
            padding-right: 52px;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: #6b7280;
            transition: background-color 0.2s var(--ease), transform 0.15s var(--ease);
        }

        .password-toggle:hover {
            background-color: #f3f4f6;
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.92);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        /* Fat 3D Button */
        .btn-primary {
            width: 100%;
            padding: 17px;
            margin-top: 6px;
            background-color: var(--blue);
            color: #ffffff;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--blue-shadow);
            transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease),
                        opacity 0.2s var(--ease), filter 0.2s var(--ease);
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.04);
            transform: translateY(-1px);
            box-shadow: 0 5px 0 var(--blue-shadow);
        }

        .btn-primary:active:not(:disabled) {
            box-shadow: 0 0 0 transparent;
            transform: translateY(2px);
        }

        .btn-primary:disabled {
            cursor: not-allowed;
        }

        /* Footer Link */
        .card-footer {
            margin-top: 28px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #f0f2f5;
        }

        .login-link {
            display: inline-block;
            color: var(--blue);
            font-size: 15px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: transparent;
            padding-bottom: 2px;
            border-bottom: 2px solid transparent;
            transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
        }

        .login-link:hover {
            color: var(--blue-shadow);
            border-bottom-color: var(--blue-soft-strong);
        }

        /* Password strength meter — versión premium */
        .password-meter {
            margin-top: 2px;
            padding: 16px 18px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: linear-gradient(180deg, #fbfcfd 0%, var(--bg-input) 100%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: border-color 0.25s var(--ease);
        }

        .password-meter__bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
        }

        .password-meter__bar span {
            display: block;
            height: 100%;
            width: 0%;
            border-radius: inherit;
            transition: width 0.35s var(--ease), background-color 0.35s var(--ease);
            background-color: #ef4444;
        }

        .password-meter__meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }

        .password-meter__text {
            font-size: 14px;
            font-weight: 800;
            color: #ef4444;
            transition: color 0.25s var(--ease);
        }

        .password-meter__hint {
            font-size: 12.5px;
            color: #6b7280;
            line-height: 1.4;
            transition: color 0.25s var(--ease);
        }

        .password-requirements {
            list-style: none;
            display: grid;
            gap: 8px;
            margin: 4px 0 0;
            padding: 0;
        }

        .password-requirements li {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 13px;
            font-weight: 700;
            color: #6b7280;
            padding: 6px 8px;
            border-radius: 9px;
            transition: color 0.25s var(--ease), background-color 0.25s var(--ease);
        }

        @media (min-width: 520px) {
            .password-requirements {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .password-requirements li.is-valid {
            color: var(--success);
            background-color: var(--success-soft);
        }

        .password-requirements li.is-invalid {
            color: #6b7280;
            background-color: transparent;
        }

        .req-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            background-color: var(--danger-soft);
            color: var(--danger);
            transition: background-color 0.25s var(--ease), color 0.25s var(--ease), transform 0.25s var(--ease);
        }

        .password-requirements li.is-valid .req-icon {
            background-color: rgba(22, 163, 74, 0.16);
            color: var(--success);
            transform: scale(1.05);
        }

        /* Responsive refinements */
        @media (max-width: 520px) {
            body {
                align-items: flex-start;
                padding: 12px;
            }

            .registration-card {
                padding: 26px 22px;
                margin-top: 10px;
                max-width: 100%;
                border-radius: 18px;
            }

            .card-header {
                margin-bottom: 24px;
            }

            .signup-form {
                gap: 14px;
            }

            .input-field {
                padding: 13px 15px;
                font-size: 15px;
                border-radius: 12px;
            }

            .password-meter {
                padding: 13px 14px;
                gap: 10px;
                border-radius: 14px;
            }

            .password-meter__bar {
                height: 6px;
            }

            .password-meter__text {
                font-size: 13px;
            }

            .password-meter__hint {
                font-size: 11.5px;
            }

            .password-requirements {
                gap: 6px;
            }

            .password-requirements li {
                font-size: 12px;
                gap: 7px;
                padding: 5px 6px;
            }

            .btn-primary {
                padding: 15px;
                font-size: 15px;
                border-radius: 12px;
            }

            .card-footer {
                margin-top: 22px;
                padding-top: 16px;
            }
        }
    </style>
</head>
<body>

    <main class="registration-card">

        <header class="card-header">
            <img src="https://em-content.zobj.net/source/twitter/376/hatching-chick_1f423.png" alt="logito " width="46" height="46">
            <h1>Egglish</h1>
        </header>

        <form class="signup-form" onsubmit="event.preventDefault();">
            <input type="text" class="input-field" placeholder="Nombre completo" required>
            <input type="email" class="input-field" placeholder="Correo electrónico" required>
            <input type="number" class="input-field" placeholder="Edad" min="1" required>
            <div class="password-field-wrapper">
                <input id="reg-password" type="password" class="input-field" placeholder="Contraseña" required>
                <button type="button" class="password-toggle" id="password-toggle" aria-label="Mostrar contraseña">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <div class="password-meter" aria-live="polite">
                <div class="password-meter__bar" aria-hidden="true">
                    <span id="password-strength-bar"></span>
                </div>
                <div class="password-meter__meta">
                    <span class="password-meter__text" id="password-strength-text">Muy débil</span>
                    <span class="password-meter__hint" id="password-strength-hint">Completa los requisitos para continuar.</span>
                </div>
                <ul class="password-requirements" id="password-requirements">
                    <li><span class="req-icon">✖</span><span>Mínimo 8 caracteres</span></li>
                    <li><span class="req-icon">✖</span><span>Al menos una letra mayúscula</span></li>
                    <li><span class="req-icon">✖</span><span>Al menos una letra minúscula</span></li>
                    <li><span class="req-icon">✖</span><span>Al menos un número</span></li>
                    <li><span class="req-icon">✖</span><span>Al menos un símbolo o carácter especial</span></li>
                </ul>
            </div>

            <button type="submit" class="btn-primary">Crear cuenta</button>
        </form>

        <footer class="card-footer">
            <a href="/entrar.html" class="login-link">Ya tengo una cuenta</a>
        </footer>

    </main>

  <!-- ✅ Script FUERA del main, justo antes de </body> -->
  <script type="module" src="/Secciones/Js/registro-logic.js"></script>
</body>
</html>
